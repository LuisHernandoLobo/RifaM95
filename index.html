                                    </select>
                                </div>
                                <div className="space-y-2">
                                    <label className="field-label !mb-0 opacity-50">Estado_Reporte</label>
                                    <select className="input-dark w-full !bg-black/40 border-white/5 focus:border-cyan-500/50 transition-all" value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
                                        {STATUS_OPTIONS.map(s=><option key={s} value={s}>{s === 'ALL' ? 'TODOS' : s.toUpperCase()}</option>)}
                                    </select>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                <div className="glass-card p-6 border-l-4 border-cyan-500">
                                    <div className="text-xs text-gray-500 font-black mb-2 uppercase">Consolidado_Periodo</div>
                                    <div className="text-4xl font-black neon-text-cyan">{filteredValues.reduce((a,r)=>a+calcTotal(r),0).toFixed(1)}H</div>
                                </div>
                                <div className="glass-card p-4 md:col-span-3 relative group">
                                    <div className="absolute top-2 right-4 z-10 flex gap-2">
                                        <button onClick={(e) => { e.stopPropagation(); setChartView('evolucion'); }} className={`text-[8px] font-black px-2 py-1 rounded-lg transition-all ${chartView==='evolucion'?'bg-cyan-500 text-black shadow-[0_0_10px_cyan]':'bg-white/5 text-gray-500'}`}>EVOLUCIÓN</button>
                                        <button onClick={(e) => { e.stopPropagation(); setChartView('top10'); }} className={`text-[8px] font-black px-2 py-1 rounded-lg transition-all ${chartView==='top10'?'bg-purple-500 text-white shadow-[0_0_10px_purple]':'bg-white/5 text-gray-500'}`}>TOP 10</button>
                                        <button onClick={(e) => { e.stopPropagation(); setChartView('excesos'); }} className={`text-[8px] font-black px-2 py-1 rounded-lg transition-all ${chartView==='excesos'?'bg-red-500 text-white shadow-[0_0_10px_red]':'bg-white/5 text-gray-500'}`}>EXCESOS</button>
                                    </div>
                                    <div className="h-32 mt-2 cursor-pointer transition-transform group-hover:scale-[1.01]" onClick={() => setIsChartFull(true)}>
                                        <HEChart data={filteredValues} view={chartView} limit={globalLimit} />
                                        <div className="absolute bottom-2 left-4 opacity-0 group-hover:opacity-100 transition-opacity text-[8px] font-black text-cyan-400 uppercase tracking-widest">Click para ampliar 🔍</div>
                                    </div>
                                </div>
                            </div>

                            <div className="glass-card p-0 overflow-hidden">
                                <div className="p-6 bg-white/5 flex justify-between items-center">
                                    <div className="flex gap-4 items-center">
                                        <input type="text" placeholder="Buscador en resultados..." className="input-dark !py-2 !px-8 w-64" value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} />
                                        <button onClick={() => descargarConsolidadoExcel(filteredValues)} className="btn-outline !py-2 !px-4 text-[10px] !bg-green-500/10 !border-green-500/30 text-green-400 hover:!bg-green-500 hover:!text-black transition-all">
                                            📥 DESCARGAR CONSOLIDADO EXCEL
                                        </button>
                                    </div>
                                    <div className="text-right"><h3 className="text-xs font-black">Registros del Periodo</h3><span className="text-[10px] text-gray-500 uppercase">Límite Quincenal: {globalLimit}h</span></div>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead><tr className="text-[10px] text-gray-500 uppercase bg-black/40"><th className="p-4">Fecha</th><th>Nombre</th><th>Móvil</th><th className="text-center">Q</th><th className="text-right">HE</th><th className="text-center">Estado</th><th className="text-center">🗑️</th></tr></thead>
                                        <tbody>
                                            {filtered.reverse().map(([k,r]) => {
                                                const total = calcTotal(r);
                                                const over = workerTotals[r.Cedula] > globalLimit;
                                                return (
                                                    <tr key={k} onClick={() => setSelectedRegistro(r)} className={`border-t border-white/5 hover:bg-white/5 cursor-pointer transition-colors`}>
                                                        <td className="p-4 font-mono text-cyan-400 text-xs">{r.fecha}</td>
                                                        <td className={`text-xs font-black ${over?'text-red-500 animate-pulse':''}`}>{r.Nombre}</td>
                                                        <td className="text-[10px] font-black text-gray-400">{[71,95,96,98].includes(Number(r.Movil))?`M-${r.Movil}`:r.Movil}</td>
                                                        <td className="text-center text-[10px] font-black text-purple-400">{r.quincena}</td>
                                                        <td className={`text-right font-black ${over?'text-red-500':''}`}>{total.toFixed(1)}</td>
                                                        <td className="text-center">
                                                            <span className={`px-2 py-0.5 rounded-full text-[8px] font-black uppercase ${r.estadoReporte === 'Reportado' ? 'bg-green-500/20 text-green-400' : 'bg-orange-500/20 text-orange-400'}`}>
                                                                {r.estadoReporte || 'Pendiente'}
                                                            </span>
                                                        </td>
                                                        <td className="text-center" onClick={e => e.stopPropagation()}>
                                                            <div className="flex justify-center gap-2">
                                                                <button onClick={()=>generarExcelReal(r)} className="text-cyan-400 hover:text-white p-2" title="Generar Reporte Excel Directo">📊</button>
                                                                <button onClick={()=>generarReporteIndividual(r)} className="text-gray-500 hover:text-white p-2" title="Generar Datos para Macro (TXT)">📄</button>
                                                                <button onClick={()=>eliminarRegistro(k)} className="text-red-500 hover:text-white p-2" title="Eliminar Registro">🗑️</button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                        );
                    })()}

                    {view === 'personal' && (
                        <div className="space-y-12 animate-fade">
                            <div className="glass-card p-10">
                                <div className="flex justify-between items-center mb-12 flex-wrap gap-6">
                                    <div>
                                        <h3 className="text-3xl font-black text-white uppercase tracking-tighter">👥 Gestión_Personal</h3>
                                        <p className="text-xs text-gray-500 font-black uppercase tracking-widest">Base de Datos de Trabajadores Operativos</p>
                                    </div>
                                    <div className="flex gap-4">
                                        {(() => {
                                            const needsInit = workers.some(w => !w.password);
                                            return (
                                                <button 
                                                    disabled={!needsInit}
                                                    onClick={() => {
                                                        const updates = {};
                                                        workers.forEach(w => {
                                                            if (!w.password) {
                                                                updates[`workers/${w.firebaseKey}/password`] = '1234';
                                                            }
                                                        });
                                                        if (Object.keys(updates).length > 0) db.ref().update(updates).then(() => showToast("Claves Inicializadas (1234)"));
                                                        else showToast("Todos ya tienen clave asignada", "info");
                                                    }} 
                                                    className={`btn-outline border-cyan-500/30 text-cyan-400 ${!needsInit ? 'opacity-30 cursor-not-allowed' : ''}`}
                                                >
                                                    Inic. Claves (1234)
                                                </button>
                                            );
                                        })()}
                                        <button onClick={() => {
                                            setEditFormData({ Cedula:'', Nombre:'', Cargo:'', Movil:'', Estado:'Activo', Equipo:'', Dependencia:'Subgerencia_Distribución', Regional:'Ocaña' });
                                            setEditingWorker({ firebaseKey: null }); // Trigger para nuevo
                                        }} className="btn-neon !bg-cyan-500 !text-black"> + Nuevo Trabajador</button>
                                        <input type="file" id="csvInput" className="hidden" accept=".csv" onChange={(e) => {
                                            const file = e.target.files[0];
                                            if (!file) return;
                                            const reader = new FileReader();
                                            reader.onload = (evt) => {
                                                try {
                                                    const text = evt.target.result;
                                                    const lines = text.split(/\r?\n/);
                                                    const headers = lines[0].split(';').map(h => h.trim());
                                                    const newWorkers = lines.slice(1).filter(l => l.trim()).map(line => {
                                                        const values = line.split(';');
                                                        const worker = {};
                                                        headers.forEach((h, i) => {
                                                            const val = values[i]?.trim();
                                                            if (h === 'Cedula') worker[h] = parseInt(val);
                                                            else worker[h] = val;
                                                        });
                                                        if (!worker.Estado) worker.Estado = 'Activo';
                                                        worker.password = '1234';
                                                        return worker;
                                                    });
                                                    askConfirm("Importar CSV", `¿Desea cargar ${newWorkers.length} trabajadores?`, () => {
                                                        db.ref('workers').set(newWorkers).then(() => showToast("Personal Actualizado"));
                                                    });
                                                } catch (err) { showToast("Error CSV", "error"); }
                                            };
                                            reader.readAsText(file, 'ISO-8859-1');
                                        }} />
                                        <button onClick={() => document.getElementById('csvInput').click()} className="btn-outline">Importar CSV</button>
                                    </div>
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-h-[700px] overflow-y-auto custom-scrollbar pr-4">
                                    {workers.sort((a,b) => a.Nombre.localeCompare(b.Nombre)).map(w => (
                                        <div key={w.firebaseKey} className={`glass-card p-8 border-0 !bg-white/5 group hover:!bg-white/10 transition-all ${w.Estado==='Inactivo'?'opacity-40':''}`}>
                                            <div className="flex justify-between items-start mb-6">
                                                <div className="w-14 h-14 bg-white/5 rounded-2xl flex items-center justify-center font-black text-gray-400 group-hover:text-cyan-400 transition-colors text-2xl">
                                                    {w.Nombre.charAt(0)}
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => setEditingWorker({...w})} className="w-10 h-10 rounded-xl bg-cyan-500/10 text-cyan-400 flex items-center justify-center hover:bg-cyan-500 hover:text-black transition-all">✏️</button>
                                                    <span className={`px-4 py-1.5 rounded-xl text-[10px] font-black flex items-center ${w.Estado==='Activo'?'bg-green-500/10 text-green-400':'bg-red-500/10 text-red-400'}`}>
                                                        {w.Estado.toUpperCase()}
                                                    </span>
                                                </div>
                                            </div>
                                            <div className="mb-6">
                                                <div className="font-black text-lg uppercase mb-1 truncate text-white">{w.Nombre}</div>
                                                <div className="text-[11px] text-gray-500 font-mono tracking-[0.2em]">ID: {w.Cedula}</div>
                                            </div>
                                            <div className="space-y-3 mb-8">
                                                <div className="text-[11px] font-black text-cyan-400 uppercase truncate bg-cyan-500/5 px-3 py-1 rounded-lg inline-block">{w.Cargo}</div>
                                                <div className="text-[10px] text-gray-400 font-bold uppercase block">{w.Equipo || 'Sin Equipo'}</div>
                                            </div>
                                            <div className="flex justify-between items-center pt-6 border-t border-white/5">
                                                <div className="text-2xl font-black font-mono text-white">
                                                    {[71, 95, 96, 98, '71', '95', '96', '98'].includes(w.Movil) ? `M-${w.Movil}` : (w.Movil || '--')}
                                                </div>
                                                <div className="text-[9px] text-gray-500 font-black uppercase tracking-widest">{w.Regional || 'Ocaña'}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'config' && (
                        <div className="space-y-12 animate-fade">
                            <div className="glass-card p-10 max-w-7xl mx-auto">
                                <h3 className="text-3xl font-black text-cyan-400 uppercase mb-12 text-center tracking-tighter">⚙️ Panel Maestro de Horarios Ordinarios</h3>
                                
                                <div className="grid grid-cols-1 xl:grid-cols-2 gap-12 mb-12">
                                    {/* Columna Técnicos */}
                                    <div className="space-y-8">
                                        <div className="flex items-center gap-4 border-b border-cyan-500/30 pb-4">
                                            <div className="w-10 h-10 bg-cyan-500 rounded-lg flex items-center justify-center font-black">👷</div>
                                            <h4 className="text-xl font-black text-cyan-400 uppercase">Personal Técnico</h4>
                                        </div>
                                        <div className="flex flex-col gap-6">
                                            {DAYS_ORDER.map(day => (
                                                <div key={day} className="bg-black/30 p-6 rounded-[24px] border border-white/10 hover:border-cyan-500/30 transition-all">
                                                    <div className="flex justify-between items-center mb-4">
                                                        <div className="text-xs font-black text-cyan-400 uppercase tracking-widest">{day}</div>
                                                        <button onClick={() => addInterval('ordinario', day)} className="text-[9px] bg-cyan-500/10 text-cyan-400 px-3 py-1 rounded-lg font-black hover:bg-cyan-500 hover:text-black transition-all">+ BLOQUE</button>
                                                    </div>
                                                    <div className="space-y-3">
                                                        {(schedules.ordinario[day] || []).map((int, i) => (
                                                            <div key={i} className="flex items-center gap-3">
                                                                <input type="time" className="input-dark !py-2 !px-3 flex-1 text-sm" value={int.desde} onChange={e => {
                                                                    const n = {...schedules}; n.ordinario[day][i].desde = e.target.value; setSchedules(n);
                                                                }} />
                                                                <span className="text-gray-600">→</span>
                                                                <input type="time" className="input-dark !py-2 !px-3 flex-1 text-sm" value={int.hasta} onChange={e => {
                                                                    const n = {...schedules}; n.ordinario[day][i].hasta = e.target.value; setSchedules(n);
                                                                }} />
                                                                <button onClick={() => removeInterval('ordinario', day, i)} className="w-8 h-8 rounded-lg bg-red-500/10 text-red-500 flex items-center justify-center font-bold hover:bg-red-500 hover:text-white transition-all">×</button>
                                                            </div>
                                                        ))}
                                                        {(!schedules.ordinario[day] || schedules.ordinario[day].length === 0) && (
                                                            <div className="text-[9px] text-gray-600 italic text-center py-2 border border-dashed border-white/5 rounded-xl uppercase tracking-widest">No Laboral / Todo Extra</div>
                                                        )}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Columna Recaudadores */}
                                    <div className="space-y-8">
                                        <div className="flex items-center gap-4 border-b border-purple-500/30 pb-4">
                                            <div className="w-10 h-10 bg-purple-500 rounded-lg flex items-center justify-center font-black">🏦</div>
                                            <h4 className="text-xl font-black text-purple-400 uppercase">Agentes Recaudadores</h4>
                                        </div>
                                        <div className="flex flex-col gap-6">
                                            {DAYS_ORDER.map(day => (
                                                <div key={day} className="bg-black/30 p-6 rounded-[24px] border border-white/10 hover:border-purple-500/30 transition-all">
                                                    <div className="flex justify-between items-center mb-4">
                                                        <div className="text-xs font-black text-purple-400 uppercase tracking-widest">{day}</div>
                                                        <button onClick={() => addInterval('recaudadores', day)} className="text-[9px] bg-purple-500/10 text-purple-400 px-3 py-1 rounded-lg font-black hover:bg-purple-500 hover:text-black transition-all">+ BLOQUE</button>
                                                    </div>
                                                    <div className="space-y-3">
                                                        {(schedules.recaudadores[day] || []).map((int, i) => (
                                                            <div key={i} className="flex items-center gap-3">
                                                                <input type="time" className="input-dark !py-2 !px-3 flex-1 text-sm" value={int.desde} onChange={e => {
                                                                    const n = {...schedules}; n.recaudadores[day][i].desde = e.target.value; setSchedules(n);
                                                                }} />
                                                                <span className="text-gray-600">→</span>
                                                                <input type="time" className="input-dark !py-2 !px-3 flex-1 text-sm" value={int.hasta} onChange={e => {
                                                                    const n = {...schedules}; n.recaudadores[day][i].hasta = e.target.value; setSchedules(n);
                                                                }} />
                                                                <button onClick={() => removeInterval('recaudadores', day, i)} className="w-8 h-8 rounded-lg bg-red-500/10 text-red-500 flex items-center justify-center font-bold hover:bg-red-500 hover:text-white transition-all">×</button>
                                                            </div>
                                                        ))}
                                                        {(!schedules.recaudadores[day] || schedules.recaudadores[day].length === 0) && (
                                                            <div className="text-[9px] text-gray-600 italic text-center py-2 border border-dashed border-white/5 rounded-xl uppercase tracking-widest">No Laboral / Todo Extra</div>
                                                        )}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="mt-16 flex flex-col items-center gap-8 border-t border-white/10 pt-12">
                                    <div className="glass-card !bg-red-500/5 border-red-500/20 p-8 w-full max-w-2xl text-center">
                                        <h4 className="text-sm font-black text-red-400 uppercase tracking-[0.3em] mb-4">🚨 Protocolos de Seguridad y Límites</h4>
                                        <div className="flex flex-col gap-2 mb-6">
                                            <p className="text-[10px] text-gray-500 font-black uppercase">El límite establecido se aplicará al total de horas acumuladas por trabajador en cada quincena.</p>
                                        </div>
                                        <div className="flex items-center justify-center gap-4">
                                            <label className="field-label !mb-0 text-cyan-400">Límite por Quincena:</label>
                                            <input type="number" value={globalLimit} onChange={e=>setGlobalLimit(e.target.value)} className="input-dark w-24 text-center !text-cyan-400 border-cyan-500/30" />
                                            <button onClick={()=>db.ref('globalLimit').set(Number(globalLimit)).then(()=>showToast("Límite Actualizado"))} className="btn-neon !bg-cyan-500 !text-black !py-3">Establecer</button>
                                        </div>
                                    </div>
                                    
                                    <div className="flex gap-4">
                                        <button onClick={() => db.ref('schedules').set(schedules).then(() => showToast("Configuración Maestra Sincronizada"))} className="btn-neon px-20">Guardar Cambios en la Nube</button>
                                        <button onClick={() => {
                                            askConfirm("Restaurar Horarios", "¿Desea restaurar la estructura de horarios a la predeterminada?", () => {
                                                db.ref('schedules').set(INITIAL_SCHEDULES).then(() => showToast("Restaurado"));
                                            });
                                        }} className="btn-outline border-red-500/50 text-red-400 hover:bg-red-500/10">Limpiar Estructura Antigua</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
