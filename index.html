    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;        
        // === SISTEMA DE TEMAS ===
        const loadTheme = () => {
            const saved = localStorage.getItem('app-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
            return saved;
        };

        const toggleTheme = () => {
            const current = document.documentElement.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('app-theme', newTheme);
            return newTheme;
        };

        // Inicializar tema al cargar
        loadTheme();

        // === COMPONENTES MEJORADOS ===

        const firebaseConfig = {
          apiKey: "AIzaSyCfErNebzeT8mRbur9qHVsufsg4C9okQMk",
          authDomain: "horas-6dbb7.firebaseapp.com",
          projectId: "horas-6dbb7",
          databaseURL: "https://horas-6dbb7-default-rtdb.firebaseio.com",
          storageBucket: "horas-6dbb7.firebasestorage.app",
          messagingSenderId: "104191928236",
          appId: "1:104191928236:web:52d342bfffb74cac8c3c09"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // Autenticación anónima para cumplir con reglas "auth != null"
        auth.signInAnonymously().catch(err => console.error("Error Auth Anónima:", err));

        const FESTIVOS_2026 = {
            '2026-01-01': 'Año Nuevo', '2026-01-06': 'Reyes Magos', '2026-03-23': 'San José',
            '2026-04-02': 'Jueves Santo', '2026-04-03': 'Viernes Santo', '2026-05-01': 'Día del Trabajo',
            '2026-05-18': 'Ascensión', '2026-06-08': 'Corpus Christi', '2026-06-15': 'Sagrado Corazón',
            '2026-06-29': 'San Pedro', '2026-07-20': 'Independencia', '2026-08-07': 'Batalla Boyacá',
            '2026-08-17': 'Asunción', '2026-10-12': 'Día Raza', '2026-11-02': 'Todos Santos',
            '2026-11-16': 'Independencia Cartagena', '2026-12-08': 'Inmaculada', '2026-12-25': 'Navidad'
        };

        const DAYS_ORDER = ['lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado', 'domingo', 'festivo'];
        const INITIAL_SCHEDULES = {
            ordinario: { lunes: [{desde:'07:00',hasta:'12:00'},{desde:'14:00',hasta:'18:00'}], martes:[{desde:'07:00',hasta:'12:00'},{desde:'14:00',hasta:'18:00'}], miercoles:[{desde:'07:00',hasta:'12:00'},{desde:'14:00',hasta:'18:00'}], jueves:[{desde:'07:00',hasta:'12:00'},{desde:'14:00',hasta:'18:00'}], viernes:[{desde:'07:00',hasta:'12:00'},{desde:'14:00',hasta:'17:00'}], sabado:[], domingo:[], festivo:[] },
            recaudadores: { lunes:[{desde:'08:00',hasta:'12:00'},{desde:'14:00',hasta:'18:00'}], martes:[{desde:'08:00',hasta:'12:00'},{desde:'14:00',hasta:'18:00'}], miercoles:[{desde:'08:00',hasta:'12:00'},{desde:'14:00',hasta:'18:00'}], jueves:[{desde:'08:00',hasta:'12:00'},{desde:'14:00',hasta:'18:00'}], viernes:[{desde:'08:00',hasta:'12:00'},{desde:'14:00',hasta:'18:00'}], sabado:[{desde:'08:00',hasta:'12:00'}], domingo:[], festivo:[] }
        };

        const calcularHorasExtras = (fecha, cargo, jornadas, configHorarios) => {
            const date = new Date(fecha + 'T00:00:00');
            const days = ['domingo', 'lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado'];
            const isHoliday = !!FESTIVOS_2026[fecha];
            const isSunday = date.getDay() === 0;
            const dayName = isHoliday ? 'festivo' : days[date.getDay()];
            const isAgente = cargo?.toLowerCase().includes('agente recaudador');
            const schema = isAgente ? configHorarios.recaudadores : configHorarios.ordinario;
            const horarioOrdinario = schema[dayName] || [];
            const res = { h30: 0, h32: 0, h34: 0, h36: 0, h38: 0, h43: 0, h39: 0 };
            let minutosFestivos = [];

            jornadas.filter(j => j.desde && j.hasta).forEach(jornada => {
                let [hI, mI] = jornada.desde.split(':').map(Number);
                let [hF, mF] = jornada.hasta.split(':').map(Number);
                let minI = hI * 60 + mI; let minF = hF * 60 + mF;
                if (minF < minI) minF += 1440;

                for (let m = minI; m < minF; m++) {
                    const t = m % 1440; const hrs = t / 60; const esDiurno = hrs >= 6 && hrs < 18;
                    const esMinutoOrdinario = horarioOrdinario.some(i => {
                        const [hOi, mOi] = i.desde.split(':').map(Number); const [hOf, mOf] = i.hasta.split(':').map(Number);
                        return t >= (hOi*60+mOi) && t < (hOf*60+mOf);
                    });

                    if (isHoliday || isSunday) {
                        if (isAgente) {
                            if (esMinutoOrdinario) { if(!esDiurno) res.h43+=(1/60); res.h39+=(1/60); }
                            else { if(esDiurno) res.h34+=(1/60); else res.h36+=(1/60); res.h39+=(1/60); }
                        } else minutosFestivos.push({ esDiurno });
                    } else {
                        if (esMinutoOrdinario) { if(!esDiurno) res.h43+=(1/60); }
                        else {
                            if(esDiurno) res.h30+=(1/60); else res.h32+=(1/60);
                        }
                    }
                }
            });

            if (!isAgente && minutosFestivos.length > 0) {
                const total = minutosFestivos.length;
                if (total < 300) minutosFestivos.forEach(m => { if(m.esDiurno) res.h34+=(1/60); else res.h36+=(1/60); });
                else {
                    res.h38 = 8.0;
                    if (total > 480) minutosFestivos.slice(480).forEach(m => { if(m.esDiurno) res.h34+=(1/60); else res.h36+=(1/60); });
                    minutosFestivos.slice(0, 480).forEach(m => { if(!m.esDiurno) res.h43+=(1/60); });
                }
            }
            Object.keys(res).forEach(k => res[k] = Math.round(res[k] * 100) / 100);
            return res;
        };

                let options = { 
                    responsive:true, 
                    maintainAspectRatio:false, 
                    plugins:{ legend:{display:false} },

                if (view === 'evolucion') {

                        if (!r.fecha) return acc;

                        }]
                    };
                    options.plugins.tooltip = { callbacks: { title: (items) => `Fecha: ${sortedLabels[items[0].dataIndex]}` } };
                } else if (view === 'top10') {
                    const workerTotals = data.reduce((acc, r) => {
                        acc[r.Nombre] = (acc[r.Nombre] || 0) + calcTotal(r);
                        return acc;
                    }, {});
                    const top10 = Object.entries(workerTotals)
                        .sort((a, b) => b[1] - a[1])
                        .slice(0, 10);
                    
                    chartData = {
                        labels: top10.map(t => t[0].split(' ')[0]),
                        datasets: [{
                            label: 'Total HE',

                            borderRadius: 8

                    const workerTotals = data.reduce((acc, r) => {
                        acc[r.Nombre] = (acc[r.Nombre] || 0) + calcTotal(r);
                        return acc;
                    }, {});
                    const excessList = Object.entries(workerTotals)
                        .filter(([name, total]) => total > limit)
                        .sort((a, b) => b[1] - a[1]);
                    
                    chartData = {
                        labels: excessList.map(t => t[0].split(' ')[0]),

                            label: 'HE Excedidas',

                            borderWidth: 2,
                            borderRadius: 8

                    // Línea de referencia del límite

                            line1: { type: 'line', xMin: limit, xMax: limit, borderColor: 'white', borderWidth: 2, borderDash: [5, 5], label: { display: true, content: 'LÍMITE', backgroundColor: 'rgba(0,0,0,0.8)' } }
                        }
                    };
                }

                const chart = new Chart(ctx, { type: view === 'evolucion' ? 'line' : 'bar', data: chartData, options });

            // Auto-cálculo de Horas Extras y Alimentación
            useEffect(() => {
                if (formData.fecha && formData.jornadas.some(j => j.desde && j.hasta)) {
                    const cargo = selectedWorkers.find(w => w.active)?.Cargo || 'Técnico';
                    const resHE = calcularHorasExtras(formData.fecha, cargo, formData.jornadas, schedules);
                    
                    let meals = { desayuno: false, almuerzo: false, cena: false };
                    
                    if (formData.viaticos !== 'SI') {
                        const ranges = formData.jornadas.filter(j => j.desde && j.hasta).map(j => {
                            let [hI, mI] = j.desde.split(':').map(Number);
                            let [hF, mF] = j.hasta.split(':').map(Number);
                            let start = hI * 60 + mI;
                            let end = hF * 60 + mF;
                            if (end < start) end += 1440;
                            return { start, end };
                        });

                        const getMinInRange = (rArr, s, e) => {
                            let total = 0;
                            rArr.forEach(r => {
                                const overlapS = Math.max(r.start, s);
                                const overlapE = Math.min(r.end, e);
                                if (overlapE > overlapS) total += (overlapE - overlapS);
                            });
                            return total;
                        };

                        // Lógica solicitada:
                        // Desayuno: labora desde las 6am (360) y después de las 7am (420) -> 1h antes y 1h después de las 7am
                        if (getMinInRange(ranges, 360, 420) >= 60 && getMinInRange(ranges, 420, 480) >= 60) meals.desayuno = true;
                        // Almuerzo: 1h antes y 1h después de las 12 (720) -> 11am a 1pm
                        if (getMinInRange(ranges, 660, 720) >= 60 && getMinInRange(ranges, 720, 780) >= 60) meals.almuerzo = true;
                        // Cena: 1h antes y 1h después de las 18 (1080) -> 5pm a 7pm
                        if (getMinInRange(ranges, 1020, 1080) >= 60 && getMinInRange(ranges, 1080, 1140) >= 60) meals.cena = true;
                    }

                    const totalHE = Object.values(resHE).reduce((a,b)=>a+b, 0);

            const guardar = async () => {

            const generarExcelReal = async (selectedR) => {
                try {
                    showToast("Cargando plantilla Excel...", "info");
                    const year = selectedR.fecha.split('-')[0]; // Ej: "2026"
                    const month = selectedR.fecha.split('-')[1]; // Ej: "04"
                    const quincena = selectedR.quincena;
                    const cedula = String(selectedR.Cedula);

                    // Desglosar dígitos para las celdas individuales
                    const y1 = year[0], y2 = year[1], y3 = year[2], y4 = year[3];
                    const m1 = month[0], m2 = month[1];

                    const records = Object.values(registros).filter(r => 
                        String(r.Cedula) === cedula && 
                        r.fecha.startsWith(`${year}-${month}`) && 
                        r.quincena === quincena
                    );

                    if (!records.length) return showToast("No se encontraron registros", "error");

                    const response = await fetch('REPORTE HORAS EXTRAS.xlsx');
                    if (!response.ok) throw new Error("No se encontró la plantilla 'REPORTE HORAS EXTRAS.xlsx'");
                    const arrayBuffer = await response.arrayBuffer();
                    
                    const workbook = new ExcelJS.Workbook();
                    await workbook.xlsx.load(arrayBuffer);

                    // Búsqueda ultra-robusta de Hojas
                    const findWS = (keys) => workbook.worksheets.find(w => {
                        const n = (w.name || "").toLowerCase();
                        return keys.some(k => n.includes(k.toLowerCase()));
                    });

                    const ws1 = findWS(["novedad", "nomina", "nmina", "reporte"]) || workbook.worksheets[0];
                    const ws2 = findWS(["relacion", "relacin"]) || workbook.worksheets[1];
                    
                    // Función para limpiar ABSOLUTAMENTE cualquier diagonal en una fila (Rompe shared styles)
                    const clearRowDiagonals = (ws, rowNum) => {
                        const row = ws.getRow(rowNum);
                        row.eachCell({ includeEmpty: true }, (cell) => {
                            const s = JSON.parse(JSON.stringify(cell.style || {}));
                            if (s.border && s.border.diagonal) {
                                s.border.diagonal = { up: false, down: false, style: null };
                                cell.style = s;
                            }
                        });
                    };

                    // Limpieza previa de la fila 4 en ambas hojas
                    clearRowDiagonals(ws1, 4);
                    clearRowDiagonals(ws2, 4);

                    // Función para asignar valor y estilo único (Aislamiento Profundo)
                    const forceSet = (ws, addr, val, isX = false) => {
                        const cell = ws.getCell(addr);
                        if (val !== undefined) cell.value = val;
                        
                        const s = JSON.parse(JSON.stringify(cell.style || {}));
                        if (!s.border) s.border = {};
                        
                        if (isX) {
                            s.border.diagonal = { up: true, down: true, style: 'thick', color: { argb: 'FF000000' } };
                        } else {
                            s.border.diagonal = { up: false, down: false, style: null };
                        }
                        cell.style = s;
                    };

                    // --- LLENADO HOJA 1 ---
                    forceSet(ws1, 'T4', y1); forceSet(ws1, 'U4', y2);
                    forceSet(ws1, 'V4', y3); forceSet(ws1, 'W4', y4);
                    forceSet(ws1, 'AB4', m1); forceSet(ws1, 'AC4', m2);
                    
                    forceSet(ws1, 'AJ4', ws1.getCell('AJ4').value, quincena === 'Q1');
                    forceSet(ws1, 'AK4', ws1.getCell('AK4').value, quincena === 'Q2');

                    // --- LLENADO HOJA 2 ---
                    forceSet(ws2, 'L4', y1); forceSet(ws2, 'M4', y2);
                    forceSet(ws2, 'N4', y3); forceSet(ws2, 'O4', y4);
                    forceSet(ws2, 'S4', m1); forceSet(ws2, 'T4', m2);
                    
                    forceSet(ws2, 'X4', ws2.getCell('X4').value, quincena === 'Q1');
                    forceSet(ws2, 'Y4', ws2.getCell('Y4').value, quincena === 'Q2');

                    // --- DATOS FIJOS HOJA 1 ---
                    ws1.getCell('I6').value = selectedR.Nombre;
                    ws1.getCell('C6').value = selectedR.Cedula;
                    ws1.getCell('Y6').value = selectedR.Cargo;
                    ws1.getCell('V7').value = selectedR.Equipo || '---';
                    ws1.getCell('C7').value = selectedR.Dependencia || 'Subgerencia_Distribución';
                    ws1.getCell('C8').value = selectedR.Regional || 'Ocaña';

                    const rowMap1 = { 'h30': 37, 'h32': 38, 'h34': 39, 'h36': 40, 'h38': 41, 'h56': 42, 'h43': 43, 'h39': 45 };
                    
                    records.forEach(r => {
                        const day = parseInt(r.fecha.split('-')[2]);
                        const col = day + 4; // Día 1 -> Col E (5) según formato oficial
                        Object.entries(rowMap1).forEach(([field, row]) => {
                            const val = Number(r[field]) || 0;
                            if (val > 0) {
                                const cell = ws1.getRow(row).getCell(col);
                                cell.value = (Number(cell.value) || 0) + val;
                            }
                        });
                    });

                    // --- DATOS FIJOS HOJA 2 ---
                    ws2.getCell('G6').value = selectedR.Nombre;
                    ws2.getCell('C6').value = selectedR.Cedula;
                    ws2.getCell('R6').value = selectedR.Cargo; // R6 según usuario
                    ws2.getCell('J7').value = selectedR.Equipo || '---';
                    ws2.getCell('C7').value = selectedR.Dependencia || 'Subgerencia_Distribución';
                    ws2.getCell('W7').value = selectedR.Regional || 'Ocaña'; // W7 según usuario

                    let allObs = [];
                    records.sort((a,b)=>a.fecha.localeCompare(b.fecha)).forEach((r, i) => {
                        const row = 11 + i;
                        if (row > 41) return; 

                        ws2.getCell(`A${row}`).value = parseInt(r.fecha.split('-')[2]);
                        ws2.getCell(`B${row}`).value = String(r.lugar).toUpperCase();
                        
                        const horarioArr = (r.jornadas || []).filter(j => j.desde && j.hasta);
                        if (horarioArr.length > 0) {
                            const first = horarioArr[0];
                            ws2.getCell(`D${row}`).value = first.desde;
                            ws2.getCell(`E${row}`).value = first.hasta;
                        }
                        
                        ws2.getCell(`V${row}`).value = r.ordenTrabajo || ''; // V según usuario
                        ws2.getCell(`L${row}`).value = r.desayuno ? 'X' : ''; // L según usuario
                        ws2.getCell(`N${row}`).value = r.almuerzo ? 'X' : ''; // N según usuario
                        ws2.getCell(`P${row}`).value = r.cena ? 'X' : ''; // P según usuario
                        ws2.getCell(`X${row}`).value = r.viaticos === 'SI' ? 'X' : ''; // X según usuario
                        ws2.getCell(`Y${row}`).value = r.viaticos !== 'SI' ? 'X' : ''; // Y según usuario

                        ws2.getCell(`F${row}`).value = r.h30 || '';
                        ws2.getCell(`G${row}`).value = r.h32 || '';
                        ws2.getCell(`H${row}`).value = r.h34 || '';
                        ws2.getCell(`I${row}`).value = r.h36 || '';
                        ws2.getCell(`J${row}`).value = r.h38 || '';
                        
                        if(r.observaciones) allObs.push(String(r.observaciones).toUpperCase());
                    });

                    ws1.getCell('E48').value = allObs.join(' | ');
                    ws2.getCell('D27').value = allObs.join(' | ');

                    const buffer = await workbook.xlsx.writeBuffer();
                    saveAs(new Blob([buffer]), `REPORTE_${selectedR.Nombre}_${year}_${month}_${quincena}.xlsx`);

                    const updates = {};
                    records.forEach(r => {
                        const entry = Object.entries(registros).find(([k, v]) => v === r);
                        if (entry) updates[`registros/${entry[0]}/estadoReporte`] = 'Reportado';
                    });
                    if (Object.keys(updates).length > 0) await db.ref().update(updates);

                    showToast("Reporte Excel generado correctamente.");
                } catch (err) {
                    console.error("Error en Excel:", err);
                    showToast("Error en Excel: " + err.message, "error");
                }
            };

            const generarReporteIndividual = async (selectedR) => {
                try {
                    const year = selectedR.fecha.split('-')[0];
                    const month = selectedR.fecha.split('-')[1];
                    const quincena = selectedR.quincena;
                    const cedula = selectedR.Cedula;

                    const records = Object.values(registros).filter(r => 
                        r.Cedula === cedula && 
                        r.fecha.startsWith(`${year}-${month}`) && 
                        r.quincena === quincena
                    );

                    if (!records.length) return showToast("No hay registros", "error");

                    // Crear string de datos para la Macro (Formato KEY;VALUE)
                    let data = [];
                    data.push(`NOMBRE;${selectedR.Nombre}`);
                    data.push(`CEDULA;${cedula}`);
                    data.push(`CARGO;${selectedR.Cargo}`);
                    data.push(`EQUIPO;${selectedR.Equipo || '---'}`);
                    data.push(`DEPENDENCIA;${selectedR.Dependencia || 'Subgerencia_Distribución'}`);
                    data.push(`REGIONAL;${selectedR.Regional || 'Ocaña'}`);
                    data.push(`QUINCENA;${quincena.toLowerCase()}`);
                    data.push(`YEAR;${year}`);
                    data.push(`MONTH;${month.padStart(2, '0')}`);

                    // Horas para cuadrícula (Hoja 1)
                    const rowMap = { '30': 37, '32': 38, '34': 39, '36': 40, '38': 41, '56': 42, '43': 43, '39': 45 };
                    const gridTotals = {}; // { "fila_col": total }
                    
                    records.forEach(r => {
                        const day = parseInt(r.fecha.split('-')[2]);
                        Object.entries(rowMap).forEach(([cod, row]) => {
                            const val = Number(r['h' + cod]) || 0;
                            if (val > 0) {
                                const key = `CELL_${row}_${day + 1}`; // Col B es 2
                                gridTotals[key] = (gridTotals[key] || 0) + val;
                            }
                        });
                    });
                    Object.entries(gridTotals).forEach(([k, v]) => data.push(`${k};${v}`));

                    // Datos para Sustento Diario (Hoja 2) y Observaciones
                    let allObs = [];
                    records.sort((a,b)=>a.fecha.localeCompare(b.fecha)).forEach((r, i) => {
                        const row = 11 + i;
                        data.push(`REL_DIA_${row};${r.fecha.split('-')[2]}`);
                        data.push(`REL_LUGAR_${row};${String(r.lugar).toUpperCase()}`);
                        const horario = (r.jornadas || []).filter(j=>j.desde).map(j=>`${j.desde}-${j.hasta}`).join(' / ');
                        data.push(`REL_HORA_${row};${horario}`);
                        
                        // Nuevos campos Hoja 2
                        data.push(`REL_OT_${row};${r.ordenTrabajo || ''}`);
                        data.push(`REL_DES_${row};${r.desayuno ? 'X' : ''}`);
                        data.push(`REL_ALM_${row};${r.almuerzo ? 'X' : ''}`);
                        data.push(`REL_CEN_${row};${r.cena ? 'X' : ''}`);
                        data.push(`REL_VSI_${row};${r.viaticos === 'SI' ? 'X' : ''}`);
                        data.push(`REL_VNO_${row};${r.viaticos !== 'SI' ? 'X' : ''}`);

                        data.push(`REL_H30_${row};${r.h30 || ''}`);
                        data.push(`REL_H32_${row};${r.h32 || ''}`);
                        data.push(`REL_H34_${row};${r.h34 || ''}`);
                        data.push(`REL_H36_${row};${r.h36 || ''}`);
                        data.push(`REL_H38_${row};${r.h38 || ''}`);
                        
                        if(r.observaciones) allObs.push(String(r.observaciones).toUpperCase());
                    });

                    // Observaciones Globales sin fecha
                    const obsTexto = allObs.join(' | ');
                    data.push(`OBS_H1;${obsTexto}`);
                    data.push(`OBS_H2;${obsTexto}`);

                    // Descargar archivo de datos con nombre descriptivo, saltos de línea Windows y BOM
                    const blob = new Blob(['\ufeff', data.join('\r\n')], { type: 'text/plain;charset=utf-8' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `DATOS_${selectedR.Nombre}_${year}_${month}_${quincena}.txt`;
                    a.click();

                    // Marcar como reportado
                    const updates = {};
                    records.forEach(r => {
                        const entry = Object.entries(registros).find(([k, v]) => v === r);
                        if (entry) updates[`registros/${entry[0]}/estadoReporte`] = 'Reportado';
                    });
                    if (Object.keys(updates).length > 0) await db.ref().update(updates);

                    showToast("Datos preparados. Use la Macro de Excel para completar.");
                } catch (err) {
                    showToast("Error al preparar datos", "error");
                }
            };

            if (loading) return <div className="h-screen flex flex-col items-center justify-center bg-black"><img src="assets/logo-lhlj.webp" className="w-32 animate-pulse mb-4" /></div>;

                                <div className="flex items-center gap-2 mt-1">
                                    <span className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                                    <span className="text-[9px] font-black text-gray-400 uppercase tracking-[0.2em]">USUARIO: {user.Nombre} <span className="text-cyan-500/50">[{user.Cargo || 'PERSONAL'}]</span></span>
                                </div>
                            </div>
                        </div>
                        <nav className="flex gap-6 text-xs font-black uppercase items-center">
                            {['ingreso','dashboard'].map(v => (
                                <button key={v} onClick={() => setView(v)} className={view===v?'nav-item-active':''}>{v}</button>

                                    </div>

                                            askConfirm("Restaurar Horarios", "¿Desea restaurar la estructura de horarios a la predeterminada?", () => {

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            {[{key:'cargos', label:'Cargos', items:cargos},{key:'equipos', label:'Equipos', items:equipos},{key:'regionales', label:'Regionales', items:regionales},{key:'dependencias', label:'Dependencias', items:dependencias}].map(cat => (

                                                    <div className="space-y-2">

                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;        
        // === SISTEMA DE TEMAS ===
        const loadTheme = () => {

        };

        // Inicializar tema al cargar
        loadTheme();

        // === COMPONENTES MEJORADOS ===

        const firebaseConfig = {
          apiKey: "AIzaSyCfErNebzeT8mRbur9qHVsufsg4C9okQMk",
          authDomain: "horas-6dbb7.firebaseapp.com",
          projectId: "horas-6dbb7",
          databaseURL: "https://horas-6dbb7-default-rtdb.firebaseio.com",
          storageBucket: "horas-6dbb7.firebasestorage.app",
          messagingSenderId: "104191928236",
          appId: "1:104191928236:web:52d342bfffb74cac8c3c09"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // Autenticación anónima para cumplir con reglas "auth != null"
        auth.signInAnonymously().catch(err => console.error("Error Auth Anónima:", err));

        const FESTIVOS_2026 = {
            '2026-01-01': 'Año Nuevo', '2026-01-06': 'Reyes Magos', '2026-03-23': 'San José',
            '2026-04-02': 'Jueves Santo', '2026-04-03': 'Viernes Santo', '2026-05-01': 'Día del Trabajo',
            '2026-05-18': 'Ascensión', '2026-06-08': 'Corpus Christi', '2026-06-15': 'Sagrado Corazón',
            '2026-06-29': 'San Pedro', '2026-07-20': 'Independencia', '2026-08-07': 'Batalla Boyacá',
            '2026-08-17': 'Asunción', '2026-10-12': 'Día Raza', '2026-11-02': 'Todos Santos',
            '2026-11-16': 'Independencia Cartagena', '2026-12-08': 'Inmaculada', '2026-12-25': 'Navidad'
        };

        const DAYS_ORDER = ['lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado', 'domingo', 'festivo'];
        const INITIAL_SCHEDULES = {
            ordinario: { lunes: [{desde:'07:00',hasta:'12:00'},{desde:'14:00',hasta:'18:00'}], martes:[{desde:'07:00',hasta:'12:00'},{desde:'14:00',hasta:'18:00'}], miercoles:[{desde:'07:00',hasta:'12:00'},{desde:'14:00',hasta:'18:00'}], jueves:[{desde:'07:00',hasta:'12:00'},{desde:'14:00',hasta:'18:00'}], viernes:[{desde:'07:00',hasta:'12:00'},{desde:'14:00',hasta:'17:00'}], sabado:[], domingo:[], festivo:[] },
            recaudadores: { lunes:[{desde:'08:00',hasta:'12:00'},{desde:'14:00',hasta:'18:00'}], martes:[{desde:'08:00',hasta:'12:00'},{desde:'14:00',hasta:'18:00'}], miercoles:[{desde:'08:00',hasta:'12:00'},{desde:'14:00',hasta:'18:00'}], jueves:[{desde:'08:00',hasta:'12:00'},{desde:'14:00',hasta:'18:00'}], viernes:[{desde:'08:00',hasta:'12:00'},{desde:'14:00',hasta:'18:00'}], sabado:[{desde:'08:00',hasta:'12:00'}], domingo:[], festivo:[] }
        };

        const calcularHorasExtras = (fecha, cargo, jornadas, configHorarios) => {
            const date = new Date(fecha + 'T00:00:00');
            const days = ['domingo', 'lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado'];
            const isHoliday = !!FESTIVOS_2026[fecha];
            const isSunday = date.getDay() === 0;
            const dayName = isHoliday ? 'festivo' : days[date.getDay()];
            const isAgente = cargo?.toLowerCase().includes('agente recaudador');
            const schema = isAgente ? configHorarios.recaudadores : configHorarios.ordinario;
            const horarioOrdinario = schema[dayName] || [];
            const res = { h30: 0, h32: 0, h34: 0, h36: 0, h38: 0, h43: 0, h39: 0 };
            let minutosFestivos = [];

            jornadas.filter(j => j.desde && j.hasta).forEach(jornada => {
                let [hI, mI] = jornada.desde.split(':').map(Number);
                let [hF, mF] = jornada.hasta.split(':').map(Number);
                let minI = hI * 60 + mI; let minF = hF * 60 + mF;
                if (minF < minI) minF += 1440;

                for (let m = minI; m < minF; m++) {
                    const t = m % 1440; const hrs = t / 60; const esDiurno = hrs >= 6 && hrs < 18;
                    const esMinutoOrdinario = horarioOrdinario.some(i => {
                        const [hOi, mOi] = i.desde.split(':').map(Number); const [hOf, mOf] = i.hasta.split(':').map(Number);
                        return t >= (hOi*60+mOi) && t < (hOf*60+mOf);
                    });

                    if (isHoliday || isSunday) {
                        if (isAgente) {
                            if (esMinutoOrdinario) { if(!esDiurno) res.h43+=(1/60); res.h39+=(1/60); }
                            else { if(esDiurno) res.h34+=(1/60); else res.h36+=(1/60); res.h39+=(1/60); }
                        } else minutosFestivos.push({ esDiurno });
                    } else {
                        if (esMinutoOrdinario) { if(!esDiurno) res.h43+=(1/60); }
                        else {
                            if(esDiurno) res.h30+=(1/60); else res.h32+=(1/60);
                        }
                    }
                }
            });

            if (!isAgente && minutosFestivos.length > 0) {
                const total = minutosFestivos.length;
                if (total < 300) minutosFestivos.forEach(m => { if(m.esDiurno) res.h34+=(1/60); else res.h36+=(1/60); });
                else {
                    res.h38 = 8.0;
                    if (total > 480) minutosFestivos.slice(480).forEach(m => { if(m.esDiurno) res.h34+=(1/60); else res.h36+=(1/60); });
                    minutosFestivos.slice(0, 480).forEach(m => { if(!m.esDiurno) res.h43+=(1/60); });
                }
            }
            Object.keys(res).forEach(k => res[k] = Math.round(res[k] * 100) / 100);
            return res;
        };

        const ToastContainer = ({ toasts, onRemove }) => (
            <div className="toast-container">
                {toasts.map(t => (
                    <div key={t.id} className={`toast ${t.type}`} role="alert" aria-live="polite">

                            {t.type === 'success' ? '✅' : t.type === 'error' ? '❌' : t.type === 'warning' ? '⚠️' : 'ℹ️'}

                        <span className="toast-message">{t.message}</span>
                        <button 
                            className="toast-close" 
                            onClick={() => onRemove(t.id)}
                            aria-label="Cerrar notificación"
                        >×</button>
                    </div>
                ))}
            </div>
        );

        const calcTotal = (r) => {
            const fields = ['h30','h32','h34','h36','h38','h56','h43','h39'];
            return Number(r.totalHE) || fields.reduce((acc, f) => acc + (Number(r[f]) || 0), 0);
        };

        const HEChart = ({ data, view = 'evolucion', limit = 40 }) => {
            const canvasRef = React.useRef(null);
            React.useEffect(() => {
                if (!canvasRef.current || !data.length) return;
                const ctx = canvasRef.current.getContext('2d');
                
                let chartData = { labels: [], datasets: [] };
                let options = { 
                    responsive:true, 
                    maintainAspectRatio:false, 
                    plugins:{ legend:{display:false} },
                    scales: {
                        y: { grid:{color:'rgba(255,255,255,0.05)'}, beginAtZero: true },
                        x: { grid:{display:false}, ticks: { color: 'rgba(255,255,255,0.5)', font: { size: 9 } } }
                    }
                };

                if (view === 'evolucion') {
                    const dailyData = data.reduce((acc, r) => {
                        if (!r.fecha) return acc;
                        acc[r.fecha] = (acc[r.fecha] || 0) + calcTotal(r);
                        return acc;
                    }, {});
                    const sortedLabels = Object.keys(dailyData).sort();
                    chartData = {
                        labels: sortedLabels.map(l => l.split('-').slice(1).reverse().join('/')),
                        datasets: [{ 
                            label:'HE Diarias', data: sortedLabels.map(l => dailyData[l]), 
                            borderColor:'#00f2ff', backgroundColor:'rgba(0,242,255,0.1)', 
                            fill:true, tension:0.4, borderWidth:3, pointRadius: 4
                        }]
                    };
                    options.plugins.tooltip = { callbacks: { title: (items) => `Fecha: ${sortedLabels[items[0].dataIndex]}` } };
                } else if (view === 'top10') {
                    const workerTotals = data.reduce((acc, r) => {
                        acc[r.Nombre] = (acc[r.Nombre] || 0) + calcTotal(r);
                        return acc;
                    }, {});
                    const top10 = Object.entries(workerTotals)
                        .sort((a, b) => b[1] - a[1])
                        .slice(0, 10);
                    
                    chartData = {
                        labels: top10.map(t => t[0].split(' ')[0]),
                        datasets: [{
                            label: 'Total HE',
                            data: top10.map(t => t[1]),
                            backgroundColor: 'rgba(157, 80, 255, 0.5)',
                            borderColor: '#9d50ff',
                            borderWidth: 2,
                            borderRadius: 8
                        }]
                    };
                    options.indexAxis = 'y';
                    options.plugins.tooltip = { callbacks: { title: (items) => top10[items[0].dataIndex][0] } };
                } else {
                    // Vista EXCESOS
                    const workerTotals = data.reduce((acc, r) => {
                        acc[r.Nombre] = (acc[r.Nombre] || 0) + calcTotal(r);
                        return acc;
                    }, {});
                    const excessList = Object.entries(workerTotals)
                        .filter(([name, total]) => total > limit)
                        .sort((a, b) => b[1] - a[1]);
                    
                    chartData = {
                        labels: excessList.map(t => t[0].split(' ')[0]),
                        datasets: [{
                            label: 'HE Excedidas',
                            data: excessList.map(t => t[1]),
                            backgroundColor: 'rgba(255, 51, 51, 0.5)',
                            borderColor: '#ff3333',
                            borderWidth: 2,
                            borderRadius: 8
                        }]
                    };
                    options.indexAxis = 'y';
                    options.plugins.tooltip = { callbacks: { title: (items) => `EXCESO: ${excessList[items[0].dataIndex][0]}` } };
                    
                    // Línea de referencia del límite
                    options.plugins.annotation = {
                        annotations: {
                            line1: { type: 'line', xMin: limit, xMax: limit, borderColor: 'white', borderWidth: 2, borderDash: [5, 5], label: { display: true, content: 'LÍMITE', backgroundColor: 'rgba(0,0,0,0.8)' } }
                        }
                    };
                }

                const chart = new Chart(ctx, { type: view === 'evolucion' ? 'line' : 'bar', data: chartData, options });
                return () => chart.destroy();
            }, [data, view, limit]);
            return <canvas ref={canvasRef} />;
        };

        const RegistroDetailModal = ({ registro, onClose }) => {
            if (!registro) return null;
            const total = calcTotal(registro);
            const fields = [
                { id:'h30', l:'30 - HE Diurna' }, { id:'h32', l:'32 - HE Nocturna' },
                { id:'h34', l:'34 - HE Dom/Fes Diu' }, { id:'h36', l:'36 - HE Dom/Fes Noc' },
                { id:'h38', l:'38 - Horas Dom/Fes' }, { id:'h43', l:'43 - Recargo Nocturno' },
                { id:'h39', l:'39 - Trabajo Dom (Rec)' }, { id:'h56', l:'56 - HE Desplazamiento' }
            ];

            const dateInfo = (() => {
                if (!registro.fecha) return { name: '', isHoliday: false };
                const d = new Date(registro.fecha + 'T00:00:00');
                const days = ['DOMINGO','LUNES','MARTES','MIÉRCOLES','JUEVES','VIERNES','SÁBADO'];
                const holiday = FESTIVOS_2026[registro.fecha];
                return { name: days[d.getDay()], holidayName: holiday };
            })();

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-content !max-w-4xl !p-0 overflow-hidden glass-card animate-fade" onClick={e => e.stopPropagation()}>
                        <div className="bg-gradient-to-r from-cyan-500/20 to-purple-500/20 p-8 border-b border-white/10 flex justify-between items-start">
                            <div className="flex gap-4 items-center">
                                <div className={`w-14 h-14 rounded-2xl flex flex-col items-center justify-center border ${dateInfo.holidayName || dateInfo.name === 'DOMINGO' ? 'border-red-500/50 bg-red-500/10' : 'border-cyan-500/50 bg-cyan-500/10'}`}>
                                    <span className={`text-[8px] font-black ${dateInfo.holidayName || dateInfo.name === 'DOMINGO' ? 'text-red-400' : 'text-cyan-400'}`}>{dateInfo.name.substring(0,3)}</span>
                                    <span className="text-xl font-black">{registro.fecha.split('-')[2]}</span>
                                </div>
                                <div>
                                    <h3 className="text-2xl font-black text-white uppercase tracking-tighter mb-1">Detalle del Reporte</h3>
                                    <div className="flex items-center gap-2">
                                        <p className="text-[10px] text-cyan-400 font-mono font-black uppercase tracking-[0.3em]">{registro.fecha} — {registro.quincena}</p>
                                        {dateInfo.holidayName && <span className="text-[8px] bg-red-500 text-white px-2 py-0.5 rounded-full font-black animate-pulse uppercase">FESTIVO: {dateInfo.holidayName}</span>}

                                    </div>
                                </div>
                            </div>
                            <button onClick={onClose} className="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 transition-all text-xl">×</button>
                        </div>
                        
                        <div className="p-8 grid grid-cols-1 lg:grid-cols-3 gap-8 max-h-[70vh] overflow-y-auto custom-scrollbar">

                                    </div>
                                    <div className="bg-white/5 p-4 rounded-2xl border border-white/5">

                                    <div className="grid grid-cols-2 gap-4">
                                        {(registro.jornadas || []).map((j, i) => j.desde && (
                                            <div key={i} className="bg-black/40 p-3 rounded-xl border border-white/5 flex flex-col items-center">
                                                <span className="text-[8px] font-black text-gray-500 mb-1">{j.label}</span>
                                                <div className="text-xs font-mono font-black text-cyan-400">{j.desde} — {j.hasta}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="space-y-3">
                                    <h4 className="text-[10px] font-black text-gray-500 uppercase tracking-widest">Observaciones</h4>
                                    <div className="bg-white/5 p-4 rounded-2xl border border-white/5 text-xs leading-relaxed text-gray-300 italic">
                                        {registro.observaciones || "Sin observaciones adicionales."}
                                    </div>
                                </div>
                            </div>

                            <div className="space-y-6">
                                <div className="bg-cyan-500/10 p-6 rounded-3xl border border-cyan-500/20 flex flex-col items-center justify-center">
                                    <label className="text-[10px] font-black text-cyan-500 uppercase mb-2">Total Horas Extras</label>
                                    <div className="text-5xl font-black text-white font-mono">{total.toFixed(1)}</div>
                                    <div className="text-[9px] font-black text-cyan-500/60 mt-2 uppercase">Horas Liquidadas</div>
                                </div>

                                <div className="bg-white/5 p-6 rounded-3xl border border-white/5 space-y-4">
                                    <h4 className="text-[10px] font-black text-gray-500 uppercase tracking-widest text-center">Desglose de Conceptos</h4>
                                    {fields.map(f => (Number(registro[f.id]) > 0) && (
                                        <div key={f.id} className="flex justify-between items-center py-2 border-b border-white/5 last:border-0">
                                            <span className="text-[9px] font-bold text-gray-400 uppercase max-w-[120px]">{f.l}</span>
                                            <span className="text-sm font-black text-white font-mono">{Number(registro[f.id]).toFixed(1)}</span>

                                    <div className="flex justify-between items-center pt-2">

                                    </div>

                                <div className="bg-white/5 p-4 rounded-2xl border border-white/5">

                                            <div key={m} className={`text-[8px] font-black px-2 py-1 rounded-lg uppercase ${registro[m] ? 'bg-cyan-500 text-black' : 'bg-white/5 text-gray-600'}`}>

        const CustomModal = ({ modal, setModal, editingWorker, setEditingWorker, editFormData, setEditFormData, onSaveWorker }) => {

                        </form>
                    </div>
                </div>
            );
            return (
                <div className="modal-overlay">
                    <div className="modal-content animate-fade">
                        <h3 className="text-xl font-black mb-4">{modal.title}</h3>
                        <p className="text-gray-400 mb-6 text-sm">{modal.message}</p>

                        <div className="flex gap-4">
                            <button onClick={() => { modal.onConfirm(modal.type === 'prompt' ? modal.value : null); setModal(null); }} className="btn-neon flex-1">Confirmar</button>
                            <button onClick={() => setModal(null)} className="btn-outline flex-1">Cancelar</button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('ingreso');
            const [theme, setTheme] = useState('dark');
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            const [user, setUser] = useState(null); // Usuario logueado {Nombre, Cedula, isAdmin, firebaseKey}
            const [workers, setWorkers] = useState([]);
            const [registros, setRegistros] = useState({});
            const [schedules, setSchedules] = useState(INITIAL_SCHEDULES);
            const [globalLimit, setGlobalLimit] = useState(40);
            const [loading, setLoading] = useState(true);
            const [selectedMovil, setSelectedMovil] = useState('');
            const [selectedWorkers, setSelectedWorkers] = useState([]);
            const [editingWorker, setEditingWorker] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterYear, setFilterYear] = useState(new Date().getFullYear().toString());
            const [filterMonth, setFilterMonth] = useState((new Date().getMonth() + 1).toString().padStart(2, '0'));
            const [filterQuincena, setFilterQuincena] = useState('ALL');
            const [filterDay, setFilterDay] = useState('ALL');
            const [filterStatus, setFilterStatus] = useState('Pendiente');
            const [chartView, setChartView] = useState('evolucion');
            const [isChartFull, setIsChartFull] = useState(false);
            const [toasts, setToasts] = useState([]);
            const [modal, setModal] = useState(null);
            const [selectedRegistro, setSelectedRegistro] = useState(null);
            const [loginData, setLoginData] = useState({ user: '', pass: '' });
            const [editFormData, setEditFormData] = useState({ Cedula:'', Nombre:'', Cargo:'', Movil:'', Estado:'Activo', Equipo:'', Dependencia:'Subgerencia_Distribución', Regional:'Ocaña' });
            const [formData, setFormData] = useState({ fecha: new Date().toISOString().split('T')[0], lugar:'', jornadas:[{desde:'',hasta:'',label:'BLOQUE 1'},{desde:'',hasta:'',label:'BLOQUE 2'}], h30:0, h32:0, h34:0, h36:0, h38:0, h56:0, h43:0, h39:0, viaticos:'NO', ordenTrabajo:'', observaciones:'' });

            const MONTHS = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
            const STATUS_OPTIONS = ['ALL', 'Pendiente', 'Reportado'];

            const handleThemeToggle = () => {
                const newTheme = toggleTheme();
                setTheme(newTheme);
            };

            const showToast = (message, type='success') => {
                const id = Date.now(); 
                setToasts(p => [...p, {id, message, type}]);
                setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 4000);
            };

            const removeToast = (id) => {
                setToasts(p => p.filter(t => t.id !== id));
            };

            const askConfirm = (title, message, onConfirm) => setModal({ title, message, onConfirm, type:'confirm' });
            const askPrompt = (title, message, onConfirm) => setModal({ title, message, onConfirm, type:'prompt', value:'' });

            useEffect(() => {
                if (editingWorker) setEditFormData({ ...editingWorker });
            }, [editingWorker]);

            // Auto-cálculo de Horas Extras y Alimentación
            useEffect(() => {
                if (formData.fecha && formData.jornadas.some(j => j.desde && j.hasta)) {
                    const cargo = selectedWorkers.find(w => w.active)?.Cargo || 'Técnico';
                    const resHE = calcularHorasExtras(formData.fecha, cargo, formData.jornadas, schedules);
                    
                    let meals = { desayuno: false, almuerzo: false, cena: false };
                    
                    if (formData.viaticos !== 'SI') {
                        const ranges = formData.jornadas.filter(j => j.desde && j.hasta).map(j => {
                            let [hI, mI] = j.desde.split(':').map(Number);
                            let [hF, mF] = j.hasta.split(':').map(Number);
                            let start = hI * 60 + mI;
                            let end = hF * 60 + mF;
                            if (end < start) end += 1440;
                            return { start, end };
                        });

                        const getMinInRange = (rArr, s, e) => {
                            let total = 0;
                            rArr.forEach(r => {
                                const overlapS = Math.max(r.start, s);
                                const overlapE = Math.min(r.end, e);
                                if (overlapE > overlapS) total += (overlapE - overlapS);
                            });
                            return total;
                        };

                        // Lógica solicitada:
                        // Desayuno: labora desde las 6am (360) y después de las 7am (420) -> 1h antes y 1h después de las 7am
                        if (getMinInRange(ranges, 360, 420) >= 60 && getMinInRange(ranges, 420, 480) >= 60) meals.desayuno = true;
                        // Almuerzo: 1h antes y 1h después de las 12 (720) -> 11am a 1pm
                        if (getMinInRange(ranges, 660, 720) >= 60 && getMinInRange(ranges, 720, 780) >= 60) meals.almuerzo = true;
                        // Cena: 1h antes y 1h después de las 18 (1080) -> 5pm a 7pm
                        if (getMinInRange(ranges, 1020, 1080) >= 60 && getMinInRange(ranges, 1080, 1140) >= 60) meals.cena = true;
                    }

                    // Actualizar solo si hay cambios para evitar bucles de renderizado
                    const totalHE = Object.values(resHE).reduce((a,b)=>a+b, 0);
                    if (totalHE !== calcTotal(formData) || formData.desayuno !== meals.desayuno || formData.almuerzo !== meals.almuerzo || formData.cena !== meals.cena) {
                        setFormData(prev => ({ ...prev, ...resHE, ...meals }));
                    }
                }
            }, [formData.fecha, formData.jornadas, formData.viaticos, selectedWorkers, schedules]);

            const infoFecha = useMemo(() => {
                if (!formData.fecha) return { dayName: '', holidayName: '' };
                const d = new Date(formData.fecha + 'T00:00:00');
                const days = ['DOMINGO','LUNES','MARTES','MIÉRCOLES','JUEVES','VIERNES','SÁBADO'];
                return { dayName: days[d.getDay()], holidayName: FESTIVOS_2026[formData.fecha] };
            }, [formData.fecha]);

            useEffect(() => {
                const init = async () => {
                    db.ref('workers').on('value', s => {
                        const val = s.val() || {};
                        const workersList = Object.entries(val).map(([k,v])=>({...v, firebaseKey:k}));
                        setWorkers(workersList);
                        
                        // Si hay un usuario logueado, intentar seleccionar su móvil por defecto
                        const savedUser = localStorage.getItem('he_user');
                        if (savedUser) {
                            const u = JSON.parse(savedUser);
                            setUser(u);
                            if (u.Movil && !selectedMovil) {
                                setSelectedMovil(u.Movil);
                                setSelectedWorkers(workersList.filter(w => String(w.Movil)===String(u.Movil)&&w.Estado==='Activo').map(w=>({...w,active:true})));
                            }
                        }
                    });
                    db.ref('schedules').on('value', s => setSchedules(s.val()||INITIAL_SCHEDULES));
                    db.ref('registros').on('value', s => setRegistros(s.val()||{}));
                    db.ref('globalLimit').on('value', s => setGlobalLimit(s.val()||40));
                    
                    setLoading(false);
                };
                init();
            }, []);

            const handleLogin = () => {
                // Acceso Maestro para el Administrador
                if (loginData.user === '999' && loginData.pass === 'Admin1234') {
                    const u = { Nombre: 'ADMINISTRADOR MAESTRO', Cedula: '999', isAdmin: true, Cargo: 'ADMIN', firebaseKey: 'MASTER' };
                    setUser(u);
                    localStorage.setItem('he_user', JSON.stringify(u));
                    showToast("Acceso Maestro concedido");
                    return;
                }

                const found = workers.find(w => 
                    String(w.Cedula) === String(loginData.user) && 
                    (w.password || '1234') === loginData.pass
                );
                if (found) {
                    const cargoStr = (found.Cargo || '').toLowerCase();
                    const u = { ...found, isAdmin: cargoStr.includes('caporal') || cargoStr.includes('admin') };
                    setUser(u);
                    localStorage.setItem('he_user', JSON.stringify(u));
                    
                    // Seleccionar móvil por defecto al loguearse
                    if (u.Movil) {
                        setSelectedMovil(u.Movil);
                        setSelectedWorkers(workers.filter(w => String(w.Movil)===String(u.Movil)&&w.Estado==='Activo').map(w=>({...w,active:true})));
                    }
                    
                    showToast(`Bienvenido, ${u.Nombre}`);
                } else {
                    showToast("Cédula o contraseña incorrecta", "error");
                }
            };

            const changePassword = async () => {
                askPrompt("Cambiar Contraseña", "Ingrese su nueva clave personal", async (newPass) => {
                    if (!newPass || newPass.length < 4) return showToast("Mínimo 4 caracteres", "error");
                    try {
                        await db.ref(`workers/${user.firebaseKey}/password`).set(newPass);
                        const updatedUser = { ...user, password: newPass };
                        setUser(updatedUser);
                        localStorage.setItem('he_user', JSON.stringify(updatedUser));
                        showToast("Contraseña actualizada con éxito");
                    } catch (err) {
                        showToast("Error al cambiar clave", "error");
                    }
                });
            };

            const handleLogout = () => {
                setUser(null);
                localStorage.removeItem('he_user');
                setView('ingreso');
            };

            if (loading) return <div className="h-screen flex flex-col items-center justify-center bg-black"><img src="assets/logo-lhlj.webp" className="w-32 animate-pulse mb-4" /></div>;

            if (!user) return (
                <div className="h-screen flex items-center justify-center p-6">
                    <div className="glass-card p-10 w-full max-w-md animate-fade">
                        <div className="flex flex-col items-center mb-10">
                            <img src="assets/logo-lhlj.webp" className="w-24 mb-6" />
                            <h2 className="text-2xl font-black neon-text-cyan uppercase tracking-tighter">Acceso Personal</h2>
                        </div>
                        <div className="space-y-6">
                            <div>
                                <label className="field-label">Número de Cédula</label>
                                <input type="number" className="input-dark w-full text-center" placeholder="SIN PUNTOS" value={loginData.user} onChange={e => setLoginData({...loginData, user: e.target.value})} />
                            </div>
                            <div>
                                <label className="field-label">Contraseña</label>
                                <input type="password" placeholder="••••" className="input-dark w-full text-center text-2xl tracking-widest" value={loginData.pass} onChange={e => setLoginData({...loginData, pass: e.target.value})} onKeyDown={e => e.key === 'Enter' && handleLogin()} />
                            </div>
                            <button onClick={handleLogin} className="btn-neon w-full !bg-cyan-500 !text-black !py-4">Entrar al Sistema</button>
                            <p className="text-[10px] text-center text-gray-500 uppercase font-black">Clave inicial: 1234</p>
                            <div className="pt-4 border-t border-white/5 text-center">
                                <p className="text-[9px] text-gray-600 uppercase">Si olvidó su clave, contacte al Administrador</p>
                            </div>

                    </div>
                </div>
            );

            const eliminarRegistro = (key) => {
                askConfirm("Borrar Registro", "¿Seguro que desea eliminarlo?", () => db.ref(`registros/${key}`).remove().then(()=>showToast("Borrado")));
            };

            const addInterval = (type, day) => {
                const n = {...schedules};
                if (!n[type][day]) n[type][day] = [];
                n[type][day].push({ desde: '07:00', hasta: '12:00' });
                setSchedules(n);
            };

            const removeInterval = (type, day, idx) => {
                const n = {...schedules};
                n[type][day].splice(idx, 1);
                setSchedules(n);
            };

            const guardar = async () => {
                const acts = selectedWorkers.filter(w => w.active);
                const totalHE = calcTotal(formData);
                
                if (!acts.length) return showToast("Seleccione al menos un trabajador", "error");
                if (!formData.lugar) return showToast("Falte el lugar de labor", "error");
                if (!formData.observaciones || formData.observaciones.trim().length < 5) return showToast("Las observaciones son obligatorias (mín. 5 letras)", "error");
                if (totalHE <= 0) return showToast("No hay horas extras para reportar", "error");

                const day = new Date(formData.fecha + 'T00:00:00').getDate();
                const quincena = day <= 15 ? 'Q1' : 'Q2';
                
                const entries = acts.map(w => ({

                showToast(`¡Reportado por ${user.Nombre}!`);
                setFormData({ ...formData, lugar:'', ordenTrabajo:'', observaciones:'', jornadas:[{desde:'',hasta:'',label:'BLOQUE 1'},{desde:'',hasta:'',label:'BLOQUE 2'}], h30:0, h32:0, h34:0, h36:0, h38:0, h56:0, h43:0, h39:0, desayuno:false, almuerzo:false, cena:false });
                setSelectedWorkers([]); setSelectedMovil('');

            const onSaveWorker = async () => {

                showToast("Guardado"); setEditingWorker(null);
            };

            const descargarConsolidadoExcel = async (filteredValues) => {
                try {
                    showToast("Generando reporte consolidado...", "info");
                    const workbook = new ExcelJS.Workbook();
                    const ws = workbook.addWorksheet('Consolidado HE');
                    
                    ws.columns = [
                        { header: 'FECHA', key: 'fecha', width: 12 },
                        { header: 'TRABAJADOR', key: 'Nombre', width: 30 },
                        { header: 'CÉDULA', key: 'Cedula', width: 15 },

                        { header: '34-HEDF', key: 'h34', width: 8 },
                        { header: '36-HENF', key: 'h36', width: 8 },
                        { header: '38-HDF', key: 'h38', width: 8 },
                        { header: '43-RN', key: 'h43', width: 8 },
                        { header: '39-TD', key: 'h39', width: 8 },
                        { header: '56-HEDP', key: 'h56', width: 8 },
                        { header: 'TOTAL HE', key: 'total', width: 10 },
                        { header: 'ALIMENTACIÓN', key: 'alimentacion', width: 20 },
                        { header: 'VIÁTICOS', key: 'viaticos', width: 10 },
                        { header: 'OBSERVACIONES', key: 'observaciones', width: 40 }
                    ];

                    filteredValues.forEach(r => {
                        const horarioStr = (r.jornadas || []).filter(j => j.desde).map(j => `${j.desde}-${j.hasta}`).join(' / ');
                        const alimStr = [r.desayuno && 'Des', r.almuerzo && 'Alm', r.cena && 'Cen'].filter(Boolean).join(', ');
                        ws.addRow({
                            ...r,
                            horario: horarioStr,
                            alimentacion: alimStr,
                            total: calcTotal(r)
                        });
                    });

                    ws.getRow(1).font = { bold: true };
                    ws.getRow(1).fill = { type: 'pattern', pattern:'solid', fgColor:{argb:'FF00F2FF'} };

                    const buffer = await workbook.xlsx.writeBuffer();
                    const fileName = `CONSOLIDADO_HE_${filterYear}_${filterMonth}_${filterQuincena}${filterDay !== 'ALL' ? '_D' + filterDay : ''}.xlsx`;
                    saveAs(new Blob([buffer]), fileName);
                    showToast("Consolidado generado");
                } catch (err) {
                    showToast("Error al generar consolidado", "error");
                }
            };

            const generarExcelReal = async (selectedR) => {
                try {
                    showToast("Cargando plantilla Excel...", "info");
                    const year = selectedR.fecha.split('-')[0]; // Ej: "2026"
                    const month = selectedR.fecha.split('-')[1]; // Ej: "04"
                    const quincena = selectedR.quincena;
                    const cedula = String(selectedR.Cedula);

                    // Desglosar dígitos para las celdas individuales
                    const y1 = year[0], y2 = year[1], y3 = year[2], y4 = year[3];
                    const m1 = month[0], m2 = month[1];

                    const records = Object.values(registros).filter(r => 
                        String(r.Cedula) === cedula && 
                        r.fecha.startsWith(`${year}-${month}`) && 
                        r.quincena === quincena
                    );

                    if (!records.length) return showToast("No se encontraron registros", "error");

                    const response = await fetch('REPORTE HORAS EXTRAS.xlsx');
                    if (!response.ok) throw new Error("No se encontró la plantilla 'REPORTE HORAS EXTRAS.xlsx'");
                    const arrayBuffer = await response.arrayBuffer();
                    
                    const workbook = new ExcelJS.Workbook();
                    await workbook.xlsx.load(arrayBuffer);

                    // Búsqueda ultra-robusta de Hojas
                    const findWS = (keys) => workbook.worksheets.find(w => {
                        const n = (w.name || "").toLowerCase();
                        return keys.some(k => n.includes(k.toLowerCase()));
                    });

                    const ws1 = findWS(["novedad", "nomina", "nmina", "reporte"]) || workbook.worksheets[0];
                    const ws2 = findWS(["relacion", "relacin"]) || workbook.worksheets[1];
                    
                    // Función para limpiar ABSOLUTAMENTE cualquier diagonal en una fila (Rompe shared styles)
                    const clearRowDiagonals = (ws, rowNum) => {
                        const row = ws.getRow(rowNum);
                        row.eachCell({ includeEmpty: true }, (cell) => {
                            const s = JSON.parse(JSON.stringify(cell.style || {}));
                            if (s.border && s.border.diagonal) {
                                s.border.diagonal = { up: false, down: false, style: null };
                                cell.style = s;
                            }
                        });
                    };

                    // Limpieza previa de la fila 4 en ambas hojas
                    clearRowDiagonals(ws1, 4);
                    clearRowDiagonals(ws2, 4);

                    // Función para asignar valor y estilo único (Aislamiento Profundo)
                    const forceSet = (ws, addr, val, isX = false) => {
                        const cell = ws.getCell(addr);
                        if (val !== undefined) cell.value = val;
                        
                        const s = JSON.parse(JSON.stringify(cell.style || {}));
                        if (!s.border) s.border = {};
                        
                        if (isX) {
                            s.border.diagonal = { up: true, down: true, style: 'thick', color: { argb: 'FF000000' } };
                        } else {
                            s.border.diagonal = { up: false, down: false, style: null };
                        }
                        cell.style = s;
                    };

                    // --- LLENADO HOJA 1 ---
                    forceSet(ws1, 'T4', y1); forceSet(ws1, 'U4', y2);
                    forceSet(ws1, 'V4', y3); forceSet(ws1, 'W4', y4);
                    forceSet(ws1, 'AB4', m1); forceSet(ws1, 'AC4', m2);
                    
                    forceSet(ws1, 'AJ4', ws1.getCell('AJ4').value, quincena === 'Q1');
                    forceSet(ws1, 'AK4', ws1.getCell('AK4').value, quincena === 'Q2');

                    // --- LLENADO HOJA 2 ---
                    forceSet(ws2, 'L4', y1); forceSet(ws2, 'M4', y2);
                    forceSet(ws2, 'N4', y3); forceSet(ws2, 'O4', y4);
                    forceSet(ws2, 'S4', m1); forceSet(ws2, 'T4', m2);
                    
                    forceSet(ws2, 'X4', ws2.getCell('X4').value, quincena === 'Q1');
                    forceSet(ws2, 'Y4', ws2.getCell('Y4').value, quincena === 'Q2');

                    // --- DATOS FIJOS HOJA 1 ---
                    ws1.getCell('I6').value = selectedR.Nombre;
                    ws1.getCell('C6').value = selectedR.Cedula;
                    ws1.getCell('Y6').value = selectedR.Cargo;
                    ws1.getCell('V7').value = selectedR.Equipo || '---';
                    ws1.getCell('C7').value = selectedR.Dependencia || 'Subgerencia_Distribución';
                    ws1.getCell('C8').value = selectedR.Regional || 'Ocaña';

                    const rowMap1 = { 'h30': 37, 'h32': 38, 'h34': 39, 'h36': 40, 'h38': 41, 'h56': 42, 'h43': 43, 'h39': 45 };
                    
                    records.forEach(r => {
                        const day = parseInt(r.fecha.split('-')[2]);
                        const col = day + 4; // Día 1 -> Col E (5) según formato oficial
                        Object.entries(rowMap1).forEach(([field, row]) => {
                            const val = Number(r[field]) || 0;
                            if (val > 0) {
                                const cell = ws1.getRow(row).getCell(col);
                                cell.value = (Number(cell.value) || 0) + val;
                            }
                        });
                    });

                    // --- DATOS FIJOS HOJA 2 ---
                    ws2.getCell('G6').value = selectedR.Nombre;
                    ws2.getCell('C6').value = selectedR.Cedula;
                    ws2.getCell('R6').value = selectedR.Cargo; // R6 según usuario
                    ws2.getCell('J7').value = selectedR.Equipo || '---';
                    ws2.getCell('C7').value = selectedR.Dependencia || 'Subgerencia_Distribución';
                    ws2.getCell('W7').value = selectedR.Regional || 'Ocaña'; // W7 según usuario

                    let allObs = [];
                    records.sort((a,b)=>a.fecha.localeCompare(b.fecha)).forEach((r, i) => {
                        const row = 11 + i;
                        if (row > 41) return; 

                        ws2.getCell(`A${row}`).value = parseInt(r.fecha.split('-')[2]);
                        ws2.getCell(`B${row}`).value = String(r.lugar).toUpperCase();
                        
                        const horarioArr = (r.jornadas || []).filter(j => j.desde && j.hasta);
                        if (horarioArr.length > 0) {
                            const first = horarioArr[0];
                            ws2.getCell(`D${row}`).value = first.desde;
                            ws2.getCell(`E${row}`).value = first.hasta;
                        }
                        
                        ws2.getCell(`V${row}`).value = r.ordenTrabajo || ''; // V según usuario
                        ws2.getCell(`L${row}`).value = r.desayuno ? 'X' : ''; // L según usuario
                        ws2.getCell(`N${row}`).value = r.almuerzo ? 'X' : ''; // N según usuario
                        ws2.getCell(`P${row}`).value = r.cena ? 'X' : ''; // P según usuario
                        ws2.getCell(`X${row}`).value = r.viaticos === 'SI' ? 'X' : ''; // X según usuario
                        ws2.getCell(`Y${row}`).value = r.viaticos !== 'SI' ? 'X' : ''; // Y según usuario

                        ws2.getCell(`F${row}`).value = r.h30 || '';
                        ws2.getCell(`G${row}`).value = r.h32 || '';
                        ws2.getCell(`H${row}`).value = r.h34 || '';
                        ws2.getCell(`I${row}`).value = r.h36 || '';
                        ws2.getCell(`J${row}`).value = r.h38 || '';
                        
                        if(r.observaciones) allObs.push(String(r.observaciones).toUpperCase());
                    });

                    ws1.getCell('E48').value = allObs.join(' | ');
                    ws2.getCell('D27').value = allObs.join(' | ');

                    const buffer = await workbook.xlsx.writeBuffer();
                    saveAs(new Blob([buffer]), `REPORTE_${selectedR.Nombre}_${year}_${month}_${quincena}.xlsx`);

                    const updates = {};
                    records.forEach(r => {
                        const entry = Object.entries(registros).find(([k, v]) => v === r);
                        if (entry) updates[`registros/${entry[0]}/estadoReporte`] = 'Reportado';
                    });
                    if (Object.keys(updates).length > 0) await db.ref().update(updates);

                    showToast("Reporte Excel generado correctamente.");
                } catch (err) {
                    console.error("Error en Excel:", err);
                    showToast("Error en Excel: " + err.message, "error");
                }
            };

            const generarReporteIndividual = async (selectedR) => {
                try {
                    const year = selectedR.fecha.split('-')[0];
                    const month = selectedR.fecha.split('-')[1];
                    const quincena = selectedR.quincena;
                    const cedula = selectedR.Cedula;

                    const records = Object.values(registros).filter(r => 
                        r.Cedula === cedula && 
                        r.fecha.startsWith(`${year}-${month}`) && 
                        r.quincena === quincena
                    );

                    if (!records.length) return showToast("No hay registros", "error");

                    // Crear string de datos para la Macro (Formato KEY;VALUE)
                    let data = [];
                    data.push(`NOMBRE;${selectedR.Nombre}`);
                    data.push(`CEDULA;${cedula}`);
                    data.push(`CARGO;${selectedR.Cargo}`);
                    data.push(`EQUIPO;${selectedR.Equipo || '---'}`);
                    data.push(`DEPENDENCIA;${selectedR.Dependencia || 'Subgerencia_Distribución'}`);
                    data.push(`REGIONAL;${selectedR.Regional || 'Ocaña'}`);
                    data.push(`QUINCENA;${quincena.toLowerCase()}`);
                    data.push(`YEAR;${year}`);
                    data.push(`MONTH;${month.padStart(2, '0')}`);

                    // Horas para cuadrícula (Hoja 1)
                    const rowMap = { '30': 37, '32': 38, '34': 39, '36': 40, '38': 41, '56': 42, '43': 43, '39': 45 };
                    const gridTotals = {}; // { "fila_col": total }
                    
                    records.forEach(r => {
                        const day = parseInt(r.fecha.split('-')[2]);
                        Object.entries(rowMap).forEach(([cod, row]) => {
                            const val = Number(r['h' + cod]) || 0;
                            if (val > 0) {
                                const key = `CELL_${row}_${day + 1}`; // Col B es 2
                                gridTotals[key] = (gridTotals[key] || 0) + val;
                            }
                        });
                    });
                    Object.entries(gridTotals).forEach(([k, v]) => data.push(`${k};${v}`));

                    // Datos para Sustento Diario (Hoja 2) y Observaciones
                    let allObs = [];
                    records.sort((a,b)=>a.fecha.localeCompare(b.fecha)).forEach((r, i) => {
                        const row = 11 + i;
                        data.push(`REL_DIA_${row};${r.fecha.split('-')[2]}`);
                        data.push(`REL_LUGAR_${row};${String(r.lugar).toUpperCase()}`);
                        const horario = (r.jornadas || []).filter(j=>j.desde).map(j=>`${j.desde}-${j.hasta}`).join(' / ');
                        data.push(`REL_HORA_${row};${horario}`);
                        
                        // Nuevos campos Hoja 2
                        data.push(`REL_OT_${row};${r.ordenTrabajo || ''}`);
                        data.push(`REL_DES_${row};${r.desayuno ? 'X' : ''}`);
                        data.push(`REL_ALM_${row};${r.almuerzo ? 'X' : ''}`);
                        data.push(`REL_CEN_${row};${r.cena ? 'X' : ''}`);
                        data.push(`REL_VSI_${row};${r.viaticos === 'SI' ? 'X' : ''}`);
                        data.push(`REL_VNO_${row};${r.viaticos !== 'SI' ? 'X' : ''}`);

                        data.push(`REL_H30_${row};${r.h30 || ''}`);
                        data.push(`REL_H32_${row};${r.h32 || ''}`);
                        data.push(`REL_H34_${row};${r.h34 || ''}`);
                        data.push(`REL_H36_${row};${r.h36 || ''}`);
                        data.push(`REL_H38_${row};${r.h38 || ''}`);
                        
                        if(r.observaciones) allObs.push(String(r.observaciones).toUpperCase());
                    });

                    // Observaciones Globales sin fecha
                    const obsTexto = allObs.join(' | ');
                    data.push(`OBS_H1;${obsTexto}`);
                    data.push(`OBS_H2;${obsTexto}`);

                    // Descargar archivo de datos con nombre descriptivo, saltos de línea Windows y BOM
                    const blob = new Blob(['\ufeff', data.join('\r\n')], { type: 'text/plain;charset=utf-8' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `DATOS_${selectedR.Nombre}_${year}_${month}_${quincena}.txt`;
                    a.click();

                    // Marcar como reportado
                    const updates = {};
                    records.forEach(r => {
                        const entry = Object.entries(registros).find(([k, v]) => v === r);
                        if (entry) updates[`registros/${entry[0]}/estadoReporte`] = 'Reportado';
                    });
                    if (Object.keys(updates).length > 0) await db.ref().update(updates);

                    showToast("Datos preparados. Use la Macro de Excel para completar.");
                } catch (err) {
                    showToast("Error al preparar datos", "error");
                }
            };
