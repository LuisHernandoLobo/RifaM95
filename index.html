<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gran Rifa $1'000.000</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <header>
    <img src="PortadaCarton.png" alt="Rifa" onclick="openFullImage()" style="cursor: zoom-in;">
    <div class="raffle-info">
      <h2>Gran Rifa de $1'000.000</h2>
      <div class="raffle-badges">
        <span class="badge badge-price">$20.000 / nro</span>
        <span class="badge badge-admin">Móvil 95</span>
      </div>
    </div>
  </header>

  <div id="raffle-grid" class="raffle-grid"></div>

  <div class="footer-actions">
    <div class="summary-card">
      <div class="summary-item">
        <span class="label">Elegidos</span>
        <span id="count-display" class="value">0</span>
      </div>
      <div class="summary-item">
        <span class="label">Total</span>
        <span class="value">$<span id="total-display">0</span></span>
      </div>
    </div>
    <button id="btn-reserve-trigger" class="btn-main" disabled>RESERVAR AHORA</button>
    <div class="admin-access">
      <button id="btn-admin-login" class="btn-ghost">MODO ADMINISTRADOR</button>
      <button id="btn-admin-broadcast" class="btn-ghost" style="display:none; color:var(--accent-green)">MENSAJE MASIVO</button>
      <button id="btn-admin-settings" class="btn-ghost" style="display:none; color:var(--accent-yellow)">AJUSTES</button>
    </div>
  </div>
</div>

<div id="modal-user" class="modal">
  <div class="modal-content card-popup">
    <h3>CONFIRMAR RESERVA</h3>
    <p id="selected-summary"></p>
    <input type="text" id="user-name" placeholder="Tu Nombre Completo">
    <input type="tel" id="user-whatsapp" placeholder="Tu WhatsApp">
    <button id="btn-confirm-reserve" class="btn-main">CONFIRMAR Y ENVIAR</button>
    <button onclick="closeModals()" class="btn-ghost">CANCELAR</button>
  </div>
</div>

<div id="modal-buyer-status" class="modal">
  <div class="modal-content card-popup" style="max-width: 500px;">
    <h3 id="status-buyer-name" style="color: var(--accent-blue); margin-bottom: 5px;">NOMBRE</h3>
    <p id="status-buyer-count" style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 15px;">0 números en total</p>
    
    <div id="container-status-reserved" style="display:none; margin-bottom: 20px;">
        <h4 style="color: var(--accent-yellow); font-size: 0.9rem; margin-bottom: 10px;">⏳ PENDIENTES DE PAGO</h4>
        <div id="grid-reserved" class="raffle-grid" style="grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 10px;"></div>
        <p id="msg-reserved" style="background: rgba(251, 191, 36, 0.1); padding: 10px; border-radius: 8px; font-size: 0.85rem; color: var(--accent-yellow); font-weight: 700; text-align: center; border: 1px dashed var(--accent-yellow);"></p>
    </div>

    <div id="container-status-sold" style="display:none; margin-bottom: 20px;">
        <h4 style="color: var(--accent-green); font-size: 0.9rem; margin-bottom: 10px;">✅ YA ESTÁN JUGANDO</h4>
        <div id="grid-sold" class="raffle-grid" style="grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 10px;"></div>
        <p style="background: rgba(16, 185, 129, 0.1); padding: 10px; border-radius: 8px; font-size: 0.85rem; color: var(--accent-green); font-weight: 700; text-align: center; border: 1px dashed var(--accent-green);">¡Tus números ya están jugando, Felicidades!</p>
    </div>

    <button onclick="closeModals()" class="btn-main" style="background: #334155; padding: 12px; font-size: 0.9rem;">CERRAR</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="app.js"></script>
</body>
</html>
